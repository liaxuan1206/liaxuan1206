<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="94" viewBox="0 0 1100 94" role="img" aria-labelledby="title desc">
  <title id="title">Elia's rotating daily note</title>
  <desc id="desc">Three short invitations rotate automatically.</desc>

  <defs>
    <linearGradient id="noteBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFF3F8" />
      <stop offset="48%" stop-color="#F9DCEB" />
      <stop offset="100%" stop-color="#EDE1FF" />
    </linearGradient>
    <linearGradient id="noteAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E5589A" />
      <stop offset="50%" stop-color="#8C6CEB" />
      <stop offset="100%" stop-color="#F06AAE" />
    </linearGradient>
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="1098" height="92" rx="22" fill="url(#noteBg)" stroke="#7B3C68" stroke-opacity=".14" stroke-width="2" />
  <rect x="24" y="20" width="116" height="54" rx="16" fill="#FFFFFF" opacity=".62" />
  <circle cx="48" cy="47" r="6" fill="#E5589A" filter="url(#dotGlow)">
    <animate attributeName="opacity" values=".35;1;.35" dur="2s" repeatCount="indefinite" />
  </circle>
  <text x="64" y="52" fill="#6D315A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="1.4">NOW</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">
    <text x="168" y="53" fill="#4D2B47" opacity="1">Come say hi — let's talk AI products, Agents, Workflows, and Connectors.
      <animate attributeName="opacity" values="1;1;0;0;0;0;1" keyTimes="0;.26;.32;.60;.66;.94;1" dur="12s" repeatCount="indefinite" />
    </text>
    <text x="168" y="53" fill="#4D2B47" opacity="0">Today's side quest: turn one fuzzy idea into something clickable.
      <animate attributeName="opacity" values="0;0;1;1;0;0;0" keyTimes="0;.26;.32;.60;.66;.94;1" dur="12s" repeatCount="indefinite" />
    </text>
    <text x="168" y="53" fill="#4D2B47" opacity="0">欢迎来找我聊 AI 产品、智能体和有趣的新想法。
      <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;.26;.32;.60;.66;.94;1" dur="12s" repeatCount="indefinite" />
    </text>
  </g>

  <rect x="168" y="68" width="704" height="2.5" rx="1.25" fill="#7B3C68" opacity=".1" />
  <rect x="168" y="68" width="704" height="2.5" rx="1.25" fill="url(#noteAccent)">
    <animate attributeName="width" values="0;704;0" keyTimes="0;.92;1" dur="4s" repeatCount="indefinite" />
  </rect>
</svg>
